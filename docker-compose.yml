version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: wms_postgres_db
    environment:
      POSTGRES_USER: wms_admin
      POSTGRES_PASSWORD: wms_secure_password123
      POSTGRES_DB: warehouse_ledger
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: